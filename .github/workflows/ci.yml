name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install lint/test tooling
        # Only the lightweight tooling is installed. The heavy runtime deps
        # (sentence-transformers, sqlite-vec) are imported lazily and are NOT
        # required for linting or for the pure-logic unit tests below.
        run: python -m pip install --upgrade pip ruff pytest

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest (pure-logic unit tests)
        # Scoped to tests/, which only exercises stdlib-backed helpers and does
        # not import the model/runtime stack.
        run: pytest -q tests
